<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SenLab Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-kicker">Local Research Database</div>
          <h1>SenLab</h1>
          <p>论文、评分、lens、主题与对比的本地演示库。</p>
        </div>
        <div class="meta-strip" id="meta-strip"></div>
        <label class="search-box">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="按标题、主题、方法、关键词检索" />
        </label>
        <div id="paper-list" class="paper-list"></div>
      </aside>

      <main class="main">
        <section class="hero">
          <div>
            <div class="hero-kicker">Paper Detail</div>
            <h2 id="paper-title"></h2>
            <p id="paper-subtitle" class="paper-subtitle"></p>
          </div>
          <div class="hero-judgment" id="one-line-judgment"></div>
        </section>

        <section class="detail-grid">
          <article class="panel summary-panel">
            <h3>结构化摘要</h3>
            <dl id="summary-fields" class="summary-fields"></dl>
          </article>

          <article class="panel ratings-panel">
            <div class="panel-head">
              <h3>六维图</h3>
              <span>道法势术器 + 主观</span>
            </div>
            <div id="radar-chart" class="radar-chart"></div>
            <div id="rating-notes" class="rating-notes"></div>
          </article>
        </section>

        <section class="detail-grid">
          <article class="panel">
            <h3>主题与 Lenses</h3>
            <div id="themes" class="chip-row"></div>
            <div id="lenses" class="stack-list"></div>
          </article>

          <article class="panel">
            <h3>Excerpts</h3>
            <div id="excerpts" class="stack-list"></div>
          </article>
        </section>

        <section class="panel markdown-panel">
          <div class="panel-head">
            <h3>Paper Card Markdown</h3>
            <span>标准化结构化笔记原文</span>
          </div>
          <pre id="markdown-view"></pre>
        </section>

        <section class="panel compare-panel">
          <div class="panel-head">
            <h3>文献对比</h3>
            <span>选择第二篇论文并排比较</span>
          </div>
          <div class="compare-controls">
            <label>
              基准论文
              <select id="compare-left"></select>
            </label>
            <label>
              对比论文
              <select id="compare-right"></select>
            </label>
          </div>
          <div id="compare-table"></div>
        </section>
      </main>
    </div>

    <script src="./data/senlab-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
